name: Auto Sync Dev Branch

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-dev:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
          submodules: 'false'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run auto-sync script
        run: python3 .github/scripts/auto-sync-dev.py
