name: Sync Submodules with Upstream

on:
  schedule:
    - cron: '0 2 * * *'  # UTC 2:00 daily (Beijing 10:00)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sync submodules
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: python3 sync_submodules.py
